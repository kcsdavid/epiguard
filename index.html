<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard PRO</title>
    <style>
        @keyframes pulse-red { 0%, 100% { background-color: #000; } 50% { background-color: #dc2626; } }
        .emergency-active { animation: pulse-red 0.5s infinite !important; }
        .bg-galaxy { background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 80%); background-color: #000; }
        @keyframes blink-red { 0%, 100% { color: white; } 50% { color: #ef4444; } }
        .blink-med { animation: blink-red 1s infinite; }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen transition-all duration-500 overflow-x-hidden">

    <div class="relative z-10 flex flex-col items-center p-6 min-h-screen">
        <header class="flex flex-col items-center mt-4 mb-6 text-center w-full">
            <img src="logo.jpeg" class="w-32 h-32 object-contain rounded-full border border-white/10 mb-4 shadow-2xl">
            <h1 class="text-4xl font-black mb-2"><span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span></h1>
        </header>

        <div id="monitor-box" class="w-full max-w-md bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-6 mb-4 text-center shadow-2xl">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest mb-1">Senzor G-Force</p>
             <div id="accel-val" class="text-6xl font-black text-white">0.00</div>
             <div class="w-full bg-gray-900 h-2 rounded-full mt-4 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-150" style="width: 0%"></div>
             </div>
        </div>

        <div id="patient-info" class="w-full max-w-md space-y-2 mb-6">
            <div class="bg-white/5 border border-blue-500/20 rounded-xl p-4">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Pacient</p>
                <p class="text-lg font-bold text-white uppercase">ANDREI POPESCU</p>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-blue-900/40 border border-blue-400/50 rounded-xl p-4 text-center">
                    <p class="text-blue-300 text-[10px] font-bold uppercase tracking-widest">Diagnostic</p>
                    <p class="text-base font-black italic blink-med uppercase">EPILEPSIE</p>
                </div>
                <div class="bg-red-900/30 border border-red-500/40 rounded-xl p-4 text-center">
                    <p class="text-red-400 text-[10px] font-bold uppercase tracking-widest">Grupă</p>
                    <p class="text-xl font-black">A II (Rh+)</p>
                </div>
            </div>
            <div class="bg-white/5 border border-l-4 border-l-red-600 rounded-xl p-4">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii</p>
                <p class="text-base text-red-500 font-black italic">PENICILINĂ, POLEN</p>
            </div>
        </div>

        <div id="timer-ui" class="hidden w-full max-w-md text-center p-8 bg-yellow-600 rounded-[2.5rem] border-4 border-white mb-6">
            <p class="text-white font-black text-xl uppercase">Impact Detectat!</p>
            <p class="text-white text-8xl font-black mb-6" id="countdown-number">5</p>
            <button onclick="stopEverything()" class="w-full py-5 bg-black text-white font-black rounded-2xl text-xl border-2 border-white">ANULEAZĂ</button>
        </div>

        <div id="emergency-ui" class="hidden w-full max-w-md text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-8 shadow-2xl">
            <p class="text-white font-black text-3xl mb-6">🚨 APELARE 112...</p>
            <a id="sms-btn" href="#" class="block w-full py-6 bg-white text-red-600 font-black rounded-2xl text-2xl uppercase mb-4">Trimite SMS de Urgență</a>
            <button onclick="stopEverything()" class="w-full py-4 bg-black/60 text-white font-black rounded-2xl text-lg border border-white/40">RESET</button>
        </div>

        <button id="main-btn" onclick="startSystem()" class="mt-auto mb-4 w-full max-w-md py-6 bg-blue-600 rounded-3xl font-black text-2xl uppercase border border-white/20 shadow-xl active:bg-blue-800 transition-all">
            ACTIVARE MONITORIZARE
        </button>

        <div id="status-bar" class="text-[10px] text-gray-500 font-mono w-full text-center p-2">Status: Sistem oprit.</div>
    </div>

<script>
    let isActive = false, hasAlerted = false, isCountingDown = false;
    let countdownTimer = null, audioCtx = null, sirenInterval = null;
    let timeLeft = 5, videoTrack = null, isFlashOn = false;

    function setStatus(msg) { document.getElementById('status-bar').innerText = "Status: " + msg; }

    // PASUL 1: Cerere permisiune de bază
    async function startSystem() {
        setStatus("Se verifică senzorii...");
        
        try {
            // IOS Request Permission
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                if (response === 'granted') {
                    proceedToFullActivation();
                } else {
                    alert("Trebuie să permiți accesul la mișcare pentru a detecta căderile.");
                }
            } else {
                // Android sau Browsere Desktop
                proceedToFullActivation();
            }
        } catch (e) {
            setStatus("Eroare la pornire. Folosește HTTPS.");
            alert("Eroare: " + e.message);
        }
    }

    // PASUL 2: Activare restul modulelor
    async function proceedToFullActivation() {
        try {
            // Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Flash (Cameră) - încercăm, dar nu blocăm dacă nu merge
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                videoTrack = stream.getVideoTracks()[0];
            } catch (err) { console.log("Fără bliț."); }

            isActive = true;
            document.getElementById('main-btn').innerText = "SISTEM ACTIV";
            document.getElementById('main-btn').className = "mt-auto mb-4 w-full max-w-md py-6 bg-green-700 text-white rounded-3xl font-black text-2xl uppercase";
            
            window.addEventListener('devicemotion', handleMotion);
            setStatus("Monitorizare ACTIVĂ");
        } catch (e) {
            alert("Eroare activare module: " + e.message);
        }
    }

    function handleMotion(e) {
        if (!isActive || hasAlerted || isCountingDown) return;
        let acc = e.acceleration;
        if (!acc || acc.x === null) return;
        
        let force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        document.getElementById('accel-val').innerText = force.toFixed(2);
        document.getElementById('accel-bar').style.width = Math.min((force / 45) * 100, 100) + "%";

        if (force > 45) startCountdown();
    }

    function startCountdown() {
        isCountingDown = true; timeLeft = 5;
        document.getElementById('monitor-box').classList.add('hidden');
        document.getElementById('patient-info').classList.add('hidden');
        document.getElementById('timer-ui').classList.remove('hidden');

        countdownTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown-number').innerText = timeLeft;
            
            // Beep scurt
            if(audioCtx) {
                let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
                o.frequency.value = 400; o.start(); o.stop(audioCtx.currentTime + 0.1);
            }

            if (timeLeft <= 0) { clearInterval(countdownTimer); triggerEmergency(); }
        }, 1000);
    }

    function triggerEmergency() {
        hasAlerted = true; isCountingDown = false;
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('main-body').classList.add('emergency-active');

        sirenInterval = setInterval(() => {
            if(audioCtx) {
                let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
                o.frequency.value = (Math.floor(Date.now() / 500) % 2 === 0) ? 950 : 650;
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            }
            // Flash intermitent
            if(videoTrack) { isFlashOn = !isFlashOn; videoTrack.applyConstraints({advanced: [{torch: isFlashOn}]}).catch(()=>{}); }
        }, 500);

        navigator.geolocation.getCurrentPosition((pos) => {
            const link = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            document.getElementById('sms-btn').href = `sms:+40729592904?body=URGENTA! Andrei Popescu (Epilepsie, A II+, Alergie Penicilina) are o criza. Locatie: ${link}`;
        });
    }

    function stopEverything() {
        location.reload(); // Cea mai sigură metodă de reset pe iPhone
    }
</script>
</body>
</html>
