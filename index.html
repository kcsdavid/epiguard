<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard Galaxy PRO</title>
    <style>
        /* Modul Alertă: fundalul pulsează în roșu aprins */
        @keyframes pulse-emergency {
            0%, 100% { background-color: #000; }
            50% { background-color: #ff0000; } 
        }
        .emergency-active { 
            animation: pulse-emergency 0.6s infinite !important;
            background-image: none !important;
        }
        /* Fundal Negru Galaxie cu reflexii profunde */
        .bg-galaxy {
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 85%);
            background-color: #000;
        }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen overflow-hidden transition-all duration-700">

    <div class="relative z-10 flex flex-col items-center h-screen p-6 overflow-y-auto">
        
        <header class="flex flex-col items-center mt-2 mb-6 text-center">
            <div class="relative">
                <div id="logo-glow" class="absolute inset-0 bg-blue-600 blur-[80px] opacity-50 animate-pulse"></div>
                <img src="logo.jpeg" alt="Logo EpiGuard" class="relative w-56 h-56 object-contain rounded-full border-2 border-white/10 shadow-2xl">
            </div>
            
            <h1 id="title-text" class="text-5xl font-black mt-4 tracking-tight drop-shadow-2xl">
                <span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span>
            </h1>

            <img src="med.jpeg" alt="Concept by MedAlert" class="w-52 h-auto mt-4 opacity-95 rounded-xl shadow-lg">
        </header>

        <div class="w-full bg-black/70 backdrop-blur-2xl border border-white/10 rounded-[3rem] p-8 mb-4 shadow-2xl text-center" onclick="forceTrigger()">
             <p class="text-purple-400 text-xs font-bold uppercase tracking-[0.3em] mb-1">Monitorizare G-Force</p>
             <div id="accel-val" class="text-7xl font-black text-white drop-shadow-[0_0_25px_rgba(59,130,246,0.8)]">0.00</div>
             <div class="w-full bg-gray-900 h-2.5 rounded-full mt-5 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-100" style="width: 0%"></div>
             </div>
        </div>

        <div class="w-full grid grid-cols-1 gap-3 mb-4">
            <div class="bg-white/5 border border-blue-500/30 rounded-2xl p-5">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Utilizator</p>
                <p class="text-xl font-medium">Andrei <span class="text-purple-500 font-black">Popescu</span></p>
            </div>
            <div class="bg-white/5 border border-purple-500/30 rounded-2xl p-5 border-l-8 border-l-red-600 shadow-lg">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii Critice</p>
                <p class="text-lg text-red-500 font-black uppercase italic">Penicilină, Polen</p>
            </div>
        </div>

        <div id="emergency-ui" class="hidden w-full text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-6 animate-bounce shadow-[0_0_50px_rgba(255,0,0,0.7)]">
            <p class="text-white font-black text-3xl mb-4">🚨 URGENȚĂ! 112</p>
            <a id="sms-btn" href="#" class="block w-full py-5 bg-white text-red-600 font-black rounded-2xl text-xl uppercase shadow-2xl active:scale-90 transition-transform">
                Trimite SMS Acum
            </a>
        </div>

        <button id="main-btn" onclick="startSystem()" class="mt-auto mb-10 w-full py-6 bg-gradient-to-r from-blue-700 to-purple-700 rounded-3xl font-black text-2xl tracking-widest uppercase border border-white/20 shadow-2xl active:scale-95 transition-all">
            Activare
        </button>
    </div>

<script>
    let isActive = false;
    let hasAlerted = false;
    let audioCtx = null;
    let clickCount = 0;

    function startSystem() {
        if (isActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(res => { if(res == 'granted') activate(); });
        } else { activate(); }
    }

    function activate() {
        isActive = true;
        const btn = document.getElementById('main-btn');
        btn.innerText = "SISTEM ACTIV";
        btn.className = "mt-auto mb-10 w-full py-6 bg-black border-2 border-blue-500/50 rounded-3xl font-black text-2xl text-blue-400 uppercase shadow-[inset_0_0_20px_rgba(59,130,246,0.3)]";
        
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive) return;
            let a = e.acceleration;
            if (!a || a.x === null) return;
            let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            document.getElementById('accel-val').innerText = total.toFixed(2);
            document.getElementById('accel-bar').style.width = Math.min((total / 45) * 100, 100) + "%";
            if (total > 45) trigger(); 
        });
    }

    function trigger() {
        if (hasAlerted) return;
        hasAlerted = true;
        
        document.getElementById('main-body').classList.add('emergency-active');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('title-text').innerHTML = "<span class='text-white'>ALERTA!</span>";
        
        // Sirenă audio
        setInterval(() => {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = 1000; g.gain.value = 0.2;
            o.start(); o.stop(audioCtx.currentTime + 0.3);
        }, 500);

        const smsBtn = document.getElementById('sms-btn');
        const nr = "+40729592904"; 
        navigator.geolocation.getCurrentPosition((pos) => {
            let maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            smsBtn.href = `sms:${nr}?body=${encodeURIComponent("ALERTA EPIGUARD! Andrei a suferit o criza medicala. Locatie GPS: " + maps)}`;
        });
    }

    function forceTrigger() {
        if (isActive) {
            clickCount++;
            if (clickCount >= 3) trigger();
        }
    }
</script>
</body>
</html>
