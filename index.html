<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard Galaxy PRO</title>
    <style>
        /* Efect de pulsație pentru modul Alertă (Roșu) */
        @keyframes pulse-emergency {
            0%, 100% { background-color: #000; }
            50% { background-color: #991b1b; } /* Roșu închis intens */
        }
        .emergency-active { 
            animation: pulse-emergency 0.7s infinite !important;
            background-image: none !important;
        }
        /* Gradient Galaxie (Fundal Negru Adânc) */
        .bg-galaxy {
            background: radial-gradient(circle at 50% 10%, #1e1b4b 0%, #000000 70%, #000000 100%);
            background-color: #000;
        }
        /* Gradient Text Animat (Albastru-Mov) */
        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% auto;
            animation: gradient-x 3s linear infinite;
        }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans overflow-hidden transition-all duration-700">

    <div class="fixed inset-0 opacity-20 pointer-events-none" id="stars-overlay">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
    </div>

    <div class="relative z-10 flex flex-col h-screen p-6">
        
        <header class="flex flex-col items-center mt-6 mb-8 text-center">
            <div class="relative group">
                <div id="logo-glow" class="absolute inset-0 bg-blue-600 blur-[50px] opacity-50 animate-pulse"></div>
                <img src="logo.jpeg" alt="Logo EpiGuard" class="relative w-36 h-36 object-contain rounded-full border-4 border-blue-500/40 shadow-[0_0_50px_rgba(59,130,246,0.6)]">
            </div>
            
            <h1 id="title-text" class="text-3xl font-black mt-5 tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-blue-400 animate-gradient-x uppercase drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]">
                EPIGUARD PRO
            </h1>

            <img src="medalert.jpeg" alt="Concept by MedAlert" class="w-32 h-auto mt-2 opacity-70 hover:opacity-100 transition-opacity">
        </header>

        <div class="bg-black/50 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-7 mb-5 shadow-[0_0_30px_rgba(30,27,75,0.5)] text-center" onclick="forceTrigger()">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest mb-1">Intensitate G-Force</p>
             <div id="accel-val" class="text-7xl font-black text-white tracking-tighter drop-shadow-[0_0_20px_rgba(59,130,246,0.9)]">0.00</div>
             <div class="w-full bg-gray-900 h-2 rounded-full mt-5 overflow-hidden border border-white/5">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-100" style="width: 0%"></div>
             </div>
        </div>

        <div class="grid grid-cols-1 gap-3 mb-5">
            <div class="bg-white/5 border border-blue-500/20 rounded-2xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Utilizator</p>
                    <p class="text-lg font-medium text-blue-50">Andrei <span class="text-purple-400 font-bold">Popescu</span></p>
                </div>
                <div class="h-10 w-10 rounded-full bg-blue-950 border border-blue-500/50 flex items-center justify-center text-blue-400 font-bold text-lg">A</div>
            </div>
            <div id="allergy-box" class="bg-white/5 border border-purple-500/20 rounded-2xl p-4 border-l-4 border-l-red-600">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii Critice</p>
                <p class="text-md font-medium text-purple-100"><span class="text-red-400">Penicilină, Polen</span></p>
            </div>
        </div>

        <div id="emergency-ui" class="hidden text-center p-7 bg-red-600 rounded-[2rem] border-4 border-white mb-6 animate-bounce shadow-[0_0_60px_rgba(239,68,68,0.8)]">
            <p class="text-white font-black text-3xl mb-2 tracking-tighter">🚨 INIȚIALIZARE 112</p>
            <p class="text-white text-xs mb-5 font-bold uppercase tracking-wider">Protocol activat. Locația GPS trimisă.</p>
            <a id="sms-btn" href="#" class="block w-full py-5 bg-white text-red-600 font-black rounded-xl text-xl shadow-2xl active:scale-95 transition-transform uppercase">
                Trimite SMS Acum
            </a>
        </div>

        <button id="main-btn" onclick="startSystem()" class="mt-auto mb-10 w-full py-5 bg-gradient-to-r from-blue-700 via-purple-700 to-blue-700 rounded-2xl font-black text-xl tracking-widest shadow-lg active:scale-95 transition-all uppercase border border-white/10">
            Activare Protecție
        </button>
    </div>

<script>
    let isActive = false;
    let hasAlerted = false;
    let audioCtx = null;
    let clickCount = 0;

    function startSystem() {
        if (isActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(res => { if(res == 'granted') activate(); });
        } else { activate(); }
    }

    function activate() {
        isActive = true;
        document.getElementById('main-btn').innerText = "SISTEM ACTIV";
        document.getElementById('main-btn').classList.replace('from-blue-700', 'from-gray-800');
        document.getElementById('main-btn').classList.remove('via-purple-700', 'to-blue-700');
        document.getElementById('main-btn').classList.add('to-gray-900');
        document.getElementById('logo-glow').classList.replace('bg-blue-600', 'bg-blue-400');
        
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive) return;
            let a = e.acceleration;
            if (!a || a.x === null) return;
            let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            document.getElementById('accel-val').innerText = total.toFixed(2);
            
            let barWidth = Math.min((total / 45) * 100, 100);
            document.getElementById('accel-bar').style.width = barWidth + "%";

            if (total > 45) trigger(); 
        });
    }

    function trigger() {
        if (hasAlerted) return;
        hasAlerted = true;

        // ACTIVARE MOD ROȘU (Alertă)
        document.getElementById('main-body').classList.add('emergency-active');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('stars-overlay').classList.add('hidden');
        
        // Transformare text titlu în alb fix
        document.getElementById('title-text').classList.remove('text-transparent', 'bg-clip-text', 'animate-gradient-x');
        document.getElementById('title-text').classList.add('text-white');
        document.getElementById('title-text').innerText = "URGENȚĂ CRITICĂ";
        
        // Sirenă
        setInterval(() => {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(800, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
            g.gain.value = 0.1;
            o.start(); o.stop(audioCtx.currentTime + 0.4);
        }, 500);

        const btn = document.getElementById('sms-btn');
        const nr = "+40729592904"; 
        let msg = "ALERTA CRITICA EPIGUARD! Andrei a suferit o criza. Necesita ajutor urgent!";
        
        navigator.geolocation.getCurrentPosition((pos) => {
            let maps = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            btn.href = `sms:${nr}?body=${encodeURIComponent(msg + " Locatie GPS: " + maps)}`;
        }, null, {enableHighAccuracy: true});
    }

    function forceTrigger() {
        if (!isActive) return;
        clickCount++;
        if (clickCount >= 3) trigger();
    }
</script>
</body>
</html>
