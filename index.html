<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard Galaxy PRO</title>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: #000; }
            50% { background-color: #dc2626; }
        }
        .emergency-active { animation: pulse-red 0.5s infinite !important; }
        .bg-galaxy {
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 80%);
            background-color: #000;
        }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen transition-all duration-500 overflow-x-hidden">

    <div class="relative z-10 flex flex-col items-center p-6 min-h-screen">
        
        <header id="header-section" class="flex flex-col items-center mt-4 mb-8 text-center w-full">
            <div class="relative mb-4">
                <div id="logo-glow" class="absolute inset-0 bg-blue-600 blur-[80px] opacity-30 animate-pulse"></div>
                <img src="logo.jpeg" alt="Logo" class="relative w-52 h-52 object-contain rounded-full border border-white/10 shadow-2xl">
            </div>
            <h1 id="title-text" class="text-5xl font-black tracking-tight mb-2">
                <span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span>
            </h1>
            <img src="med.jpeg" alt="MedAlert" class="w-48 h-auto opacity-80 rounded-lg">
        </header>

        <div id="monitor-box" class="w-full max-w-md bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-8 mb-6 text-center shadow-2xl cursor-pointer" onclick="forceTrigger()">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Senzor G-Force</p>
             <div id="accel-val" class="text-7xl font-black text-white">0.00</div>
             <div class="w-full bg-gray-900 h-3 rounded-full mt-6 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-150" style="width: 0%"></div>
             </div>
        </div>

        <div id="patient-info" class="w-full max-w-md space-y-3 mb-8">
            <div class="bg-white/5 border border-blue-500/20 rounded-2xl p-5">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Utilizator</p>
                <p class="text-xl font-medium">Andrei <span class="text-purple-500 font-black">Popescu</span></p>
            </div>
            <div class="bg-blue-900/40 border border-blue-400/50 rounded-2xl p-5 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <p class="text-blue-300 text-[10px] font-bold uppercase tracking-widest">Diagnostic Principal</p>
                <p class="text-2xl font-black text-white italic tracking-tighter uppercase">EPILEPSIE</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 border-l-8 border-l-red-600 rounded-2xl p-5">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii Critice</p>
                <p class="text-lg text-red-500 font-black uppercase italic">Penicilină, Polen</p>
            </div>
        </div>

        <div id="timer-ui" class="hidden w-full max-w-md text-center p-8 bg-yellow-600 rounded-[2.5rem] border-4 border-white mb-6 animate-pulse shadow-2xl">
            <p class="text-white font-black text-xl mb-2 italic uppercase">Impact Detectat!</p>
            <p class="text-white text-7xl font-black mb-6" id="countdown-number">5</p>
            <button onclick="cancelAlert()" class="w-full py-5 bg-black text-white font-black rounded-2xl text-xl uppercase border-2 border-white">
                SUNT BINE (ANULEAZĂ)
            </button>
        </div>

        <div id="emergency-ui" class="hidden w-full max-w-md text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-8 shadow-2xl">
            <p class="text-white font-black text-2xl mb-6 animate-bounce">🚨 INIȚIALIZARE APEL 112</p>
            <a id="sms-btn" href="#" class="block w-full py-6 bg-white text-red-600 font-black rounded-2xl text-2xl shadow-2xl uppercase mb-4">
                Trimite SMS
            </a>
            <button onclick="stopEverything()" class="w-full py-4 bg-black/60 text-white font-black rounded-2xl text-lg uppercase border-2 border-white/40">
                OPRIRE / RESET
            </button>
        </div>

        <button id="main-btn" onclick="requestPermissions()" class="mt-auto mb-6 w-full max-w-md py-6 bg-gradient-to-r from-blue-600 to-purple-700 rounded-3xl font-black text-2xl tracking-widest uppercase border border-white/20 shadow-xl active:scale-95 transition-all">
            Activare
        </button>
    </div>

<script>
    let isActive = false, hasAlerted = false, isCountingDown = false;
    let countdownTimer = null, audioCtx = null, sirenInterval = null, flashInterval = null;
    let timeLeft = 5, clickCount = 0, videoTrack = null, isFlashOn = false;

    async function requestPermissions() {
        if (isActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res !== 'granted') return alert("Senzori refuzați.");
            }
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoTrack = stream.getVideoTracks()[0];
            activateSystem();
        } catch (e) { alert("Sistemul are nevoie de cameră pentru Flash SOS."); }
    }

    function activateSystem() {
        isActive = true;
        document.getElementById('main-btn').innerText = "SISTEM ACTIV";
        document.getElementById('main-btn').className = "mt-auto mb-6 w-full max-w-md py-6 bg-black border-2 border-blue-500/40 rounded-3xl font-black text-2xl text-blue-400 uppercase";
        
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive || isCountingDown) return;
            let a = e.acceleration;
            if (a && a.x !== null) {
                let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
                document.getElementById('accel-val').innerText = total.toFixed(2);
                document.getElementById('accel-bar').style.width = Math.min((total / 45) * 100, 100) + "%";
                if (total > 45) startCountdown();
            }
        });
    }

    function forceTrigger() { if (isActive) { clickCount++; if (clickCount >= 3) startCountdown(); setTimeout(() => clickCount = 0, 2000); } }

    function toggleFlash(state) {
        if (videoTrack && navigator.mediaDevices.getSupportedConstraints().torch) {
            videoTrack.applyConstraints({ advanced: [{ torch: state }] }).catch(() => {});
        }
    }

    function startCountdown() {
        if (isCountingDown) return;
        isCountingDown = true; timeLeft = 5;
        document.getElementById('monitor-box').classList.add('hidden');
        document.getElementById('patient-info').classList.add('hidden');
        document.getElementById('timer-ui').classList.remove('hidden');

        countdownTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown-number').innerText = timeLeft;
            
            // Beep + Blitz scurt la fiecare secunda
            let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
            o.frequency.value = 300; o.start(); o.stop(audioCtx.currentTime + 0.1);
            
            toggleFlash(true);
            setTimeout(() => toggleFlash(false), 100);

            if (timeLeft <= 0) { clearInterval(countdownTimer); triggerEmergency(); }
        }, 1000);
    }

    function triggerEmergency() {
        hasAlerted = true; isCountingDown = false;
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('main-body').classList.add('emergency-active');

        // Sirena + Blitz Stroboscop (Rapid)
        sirenInterval = setInterval(() => {
            let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
            o.frequency.value = (Math.floor(Date.now() / 500) % 2 === 0) ? 900 : 600;
            o.start(); o.stop(audioCtx.currentTime + 0.4);
            
            isFlashOn = !isFlashOn;
            toggleFlash(isFlashOn);
        },
