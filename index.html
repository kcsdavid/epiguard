<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard Galaxy PRO</title>
    <style>
        /* Efectul de impact: Roșu pulsant */
        @keyframes pulse-red {
            0%, 100% { background-color: #000; }
            50% { background-color: #dc2626; }
        }
        .emergency-active { 
            animation: pulse-red 0.5s infinite !important;
            background-image: none !important;
        }
        /* Fundal Space/Galaxy */
        .bg-galaxy {
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 80%);
            background-color: #000;
        }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen transition-all duration-500 overflow-x-hidden">

    <div class="relative z-10 flex flex-col items-center p-6 min-h-screen">
        
        <header class="flex flex-col items-center mt-4 mb-8 text-center w-full">
            <div class="relative mb-6">
                <div id="logo-glow" class="absolute inset-0 bg-blue-600 blur-[80px] opacity-40 animate-pulse"></div>
                <img src="logo.jpeg" alt="Logo" class="relative w-52 h-52 object-contain rounded-full shadow-2xl border border-white/10">
            </div>
            
            <h1 id="title-text" class="text-5xl font-black tracking-tight mb-4">
                <span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span>
            </h1>

            <img src="med.jpeg" alt="MedAlert Concept" class="w-48 h-auto opacity-90 rounded-lg shadow-lg">
        </header>

        <div class="w-full max-w-md bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-8 mb-6 text-center shadow-2xl" onclick="forceTrigger()">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Senzor G-Force</p>
             <div id="accel-val" class="text-7xl font-black text-white drop-shadow-[0_0_20px_rgba(59,130,246,0.6)]">0.00</div>
             <div class="w-full bg-gray-900 h-3 rounded-full mt-6 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-150" style="width: 0%"></div>
             </div>
        </div>

        <div class="w-full max-w-md space-y-3 mb-8">
            <div class="bg-white/5 border border-blue-500/20 rounded-2xl p-5">
                <p class="text-blue-400 text-[10px] font-bold uppercase">Pacient Monitorizat</p>
                <p class="text-xl font-semibold">Andrei <span class="text-purple-500 font-bold">Popescu</span></p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 border-l-8 border-l-red-600 rounded-2xl p-5">
                <p class="text-purple-400 text-[10px] font-bold uppercase">Alergii Critice</p>
                <p class="text-lg text-red-500 font-black uppercase">Penicilină, Polen</p>
            </div>
        </div>

        <div id="emergency-ui" class="hidden w-full max-w-md text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-8 animate-bounce">
            <p class="text-white font-black text-3xl mb-4">🚨 URGENȚĂ DETECTATĂ</p>
            <a id="sms-btn" href="#" class="block w-full py-5 bg-white text-red-600 font-black rounded-2xl text-xl shadow-2xl uppercase">Trimite SMS Acum</a>
        </div>

        <button id="main-btn" onclick="startSystem()" class="mt-auto mb-6 w-full max-w-md py-6 bg-gradient-to-r from-blue-600 to-purple-700 rounded-3xl font-black text-2xl tracking-widest uppercase shadow-xl active:scale-95 transition-all">
            Activare Sistem
        </button>
    </div>

<script>
    let isActive = false;
    let hasAlerted = false;
    let audioCtx = null;
    let clickCount = 0;

    function startSystem() {
        if (isActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(res => { if(res == 'granted') activate(); });
        } else { activate(); }
    }

    function activate() {
        isActive = true;
        const btn = document.getElementById('main-btn');
        btn.innerText = "SISTEM ACTIV";
        btn.className = "mt-auto mb-6 w-full max-w-md py-6 bg-black border-2 border-blue-500/40 rounded-3xl font-black text-2xl text-blue-400 uppercase shadow-inner";
        
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive) return;
            let a = e.acceleration;
            if (!a || a.x === null) return;
            let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            document.getElementById('accel-val').innerText = total.toFixed(2);
            document.getElementById('accel-bar').style.width = Math.min((total / 45) * 100, 100) + "%";
            
            // Impact detectat (peste 45 G)
            if (total > 45) trigger(); 
        });
    }

    function trigger() {
        if (hasAlerted) return;
        hasAlerted = true;
        
        // Aplica fundalul rosu pulsant
        document.getElementById('main-body').classList.add('emergency-active');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('title-text').innerHTML = "<span class='text-white'>URGENȚĂ!</span>";
        
        // Sirena audio
        setInterval(() => {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = 800;
            g.gain.value = 0.1;
            o.start(); o.stop(audioCtx.currentTime + 0.3);
        }, 500);

        const smsBtn = document.getElementById('sms-btn');
        const nr = "+40729592904"; 
        navigator.geolocation.getCurrentPosition((pos) => {
            let maps = `http://googleusercontent.com/maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            smsBtn.href = `sms:${nr}?body=${encodeURIComponent("ALERTA EPIGUARD! Andrei a suferit un impact. Locatie: " + maps)}`;
        });
    }

    function forceTrigger() {
        if (isActive) {
            clickCount++;
            if (clickCount >= 3) trigger();
        }
    }
</script>
</body>
</html>
