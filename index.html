<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard PRO v7.1</title>
    <style>
        @keyframes pulse-red { 0%, 100% { background-color: #000; } 50% { background-color: #dc2626; } }
        .emergency-active { animation: pulse-red 0.5s infinite !important; }
        .bg-galaxy { background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 80%); background-color: #000; }
        @keyframes blink-red { 0%, 100% { color: white; } 50% { color: #ef4444; } }
        .blink-med { animation: blink-red 1s infinite; }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen transition-all duration-500 overflow-x-hidden">

    <div class="relative z-10 flex flex-col items-center p-6 min-h-screen">
        
        <header id="header-section" class="flex flex-col items-center mt-4 mb-6 text-center w-full">
            <img src="logo.jpeg" alt="Logo" class="w-40 h-40 object-contain rounded-full border border-white/10 mb-4 shadow-2xl">
            <h1 id="title-text" class="text-5xl font-black mb-2"><span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span></h1>
            <img src="med.jpeg" alt="MedAlert" class="w-40 h-auto opacity-90 rounded-lg">
        </header>

        <div id="monitor-box" class="w-full max-w-md bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-6 mb-4 text-center shadow-2xl">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest mb-1">Senzor G-Force</p>
             <div id="accel-val" class="text-6xl font-black text-white">0.00</div>
             <div class="w-full bg-gray-900 h-2 rounded-full mt-4 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-150" style="width: 0%"></div>
             </div>
        </div>

        <div id="patient-info" class="w-full max-w-md space-y-2 mb-6">
            <div class="bg-white/5 border border-blue-500/20 rounded-xl p-4">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Nume Pacient</p>
                <p class="text-lg font-bold text-white uppercase">ANDREI POPESCU</p>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-blue-900/40 border border-blue-400/50 rounded-xl p-4">
                    <p class="text-blue-300 text-[10px] font-bold uppercase tracking-widest">Diagnostic</p>
                    <p class="text-base font-black italic uppercase blink-med">EPILEPSIE</p>
                </div>
                <div class="bg-red-900/30 border border-red-500/40 rounded-xl p-4">
                    <p class="text-red-400 text-[10px] font-bold uppercase tracking-widest">Grupă Sanguină</p>
                    <p class="text-xl font-black text-white">A II (Rh+)</p>
                </div>
            </div>

            <div class="bg-white/5 border border-l-4 border-l-red-600 rounded-xl p-4">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii Critice</p>
                <p class="text-base text-red-500 font-black uppercase italic">Penicilină, Polen</p>
            </div>
        </div>

        <div id="timer-ui" class="hidden w-full max-w-md text-center p-8 bg-yellow-600 rounded-[2.5rem] border-4 border-white mb-6 animate-pulse">
            <p class="text-white font-black text-xl italic uppercase">Impact Detectat!</p>
            <p class="text-white text-8xl font-black mb-6" id="countdown-number">5</p>
            <button onclick="cancelAlert()" class="w-full py-5 bg-black text-white font-black rounded-2xl text-xl border-2 border-white">ANULEAZĂ</button>
        </div>

        <div id="emergency-ui" class="hidden w-full max-w-md text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-8 shadow-2xl">
            <p class="text-white font-black text-3xl mb-6 animate-bounce">🚨 APELARE 112...</p>
            <a id="sms-btn" href="#" class="block w-full py-6 bg-white text-red-600 font-black rounded-2xl text-2xl uppercase mb-4 shadow-xl">Trimite SMS de Urgență</a>
            <button onclick="stopEverything()" class="w-full py-4 bg-black/60 text-white font-black rounded-2xl text-lg uppercase border border-white/40">OPRIRE / RESET</button>
        </div>

        <button id="main-btn" onclick="startSystem()" class="mt-auto mb-4 w-full max-w-md py-6 bg-gradient-to-r from-blue-600 to-purple-700 rounded-3xl font-black text-2xl uppercase border border-white/20 shadow-xl active:scale-95 transition-all">
            ACTIVARE SISTEM
        </button>

        <div id="status-bar" class="text-[10px] text-gray-500 font-mono w-full text-center p-2 bg-white/5 rounded">Status: În așteptare. Apasă Activare.</div>
    </div>

<script>
    let isActive = false, hasAlerted = false, isCountingDown = false;
    let countdownTimer = null, audioCtx = null, sirenInterval = null;
    let timeLeft = 5, videoTrack = null, isFlashOn = false;

    function setStatus(msg) { document.getElementById('status-bar').innerText = "Status: " + msg; }

    async function startSystem() {
        if (isActive) return;
        setStatus("Se solicită permisiuni...");
        
        try {
            // Inițializare Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Permisiune Mișcare (iPhone)
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res !== 'granted') throw new Error("Permisiune Senzori Refuzată");
            }
            
            // Permisiune Cameră (Flash)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                videoTrack = stream.getVideoTracks()[0];
                setStatus("Activ (Senzori + Flash)");
            } catch (e) {
                setStatus("Activ (Doar Senzori - Fără Flash)");
            }
            
            isActive = true;
            const btn = document.getElementById('main-btn');
            btn.innerText = "SISTEM ACTIV";
            btn.className = "mt-auto mb-4 w-full max-w-md py-6 bg-green-900 border-2 border-green-500 text-green-400 rounded-3xl font-black text-2xl uppercase";
            
            initMotion();
        } catch (err) {
            setStatus("Eroare: " + err.message);
            alert("Atenție: Site-ul trebuie deschis cu HTTPS pentru a funcționa!");
        }
    }

    function initMotion() {
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive || isCountingDown) return;
            let a = e.acceleration;
            if (a && a.x !== null) {
                let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
                document.getElementById('accel-val').innerText = total.toFixed(2);
                document.getElementById('accel-bar').style.width = Math.min((total / 45) * 100, 100) + "%";
                if (total > 45) startCountdown();
            }
        });
    }

    function toggleFlash(state) {
        if (videoTrack && videoTrack.applyConstraints) {
            videoTrack.applyConstraints({ advanced: [{ torch: state }] }).catch(() => {});
        }
    }

    function startCountdown() {
        if (isCountingDown) return;
        isCountingDown = true; timeLeft = 5;
        document.getElementById('monitor-box').classList.add('hidden');
        document.getElementById('patient-info').classList.add('hidden');
        document.getElementById('timer-ui').classList.remove('hidden');

        countdownTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown-number').innerText = timeLeft;
            
            // Beep + Flash
            let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
            o.frequency.value = 400; o.start(); o.stop(audioCtx.currentTime + 0.1);
            toggleFlash(true); setTimeout(() => toggleFlash(false), 150);

            if (timeLeft <= 0) { clearInterval(countdownTimer); triggerEmergency(); }
        }, 1000);
    }

    function triggerEmergency() {
        hasAlerted = true; isCountingDown = false;
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('main-body').classList.add('emergency-active');

        sirenInterval = setInterval(() => {
            let o = audioCtx.createOscillator(); o.connect(audioCtx.destination);
            o.frequency.value = (Math.floor(Date.now() / 500) % 2 === 0) ? 950 : 650;
            o.start(); o.stop(audioCtx.currentTime + 0.4);
            isFlashOn = !isFlashOn; toggleFlash(isFlashOn);
        }, 500);

        navigator.geolocation.getCurrentPosition((pos) => {
            const maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            document.getElementById('sms-btn').href = `sms:+40729592904?body=${encodeURIComponent("URGENTA! Andrei Popescu (Epilepsie, A II+, Alergie Penicilina) are o criza. Locatie: " + maps)}`;
        });
    }

    function stopEverything() {
        if (sirenInterval) clearInterval(sirenInterval);
        if (countdownTimer) clearInterval(countdownTimer);
        toggleFlash(false);
        hasAlerted = false; isCountingDown = false;
        document.getElementById('emergency-ui').classList.add('hidden');
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('monitor-box').classList.remove('hidden');
        document.getElementById('patient-info').classList.remove('hidden');
        document.getElementById('main-body').classList.remove('emergency-active');
    }

    function cancelAlert() { stopEverything(); }
</script>
</body>
</html>
