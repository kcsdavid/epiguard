<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>EpiGuard Galaxy Safe</title>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: #000; }
            50% { background-color: #dc2626; }
        }
        .emergency-active { 
            animation: pulse-red 0.5s infinite !important;
        }
        .bg-galaxy {
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #000000 80%);
            background-color: #000;
        }
    </style>
</head>
<body id="main-body" class="bg-galaxy text-white font-sans min-h-screen transition-all duration-500 overflow-x-hidden">

    <div class="relative z-10 flex flex-col items-center p-6 min-h-screen">
        
        <header id="header-section" class="flex flex-col items-center mt-4 mb-8 text-center w-full">
            <div class="relative mb-4">
                <div id="logo-glow" class="absolute inset-0 bg-blue-600 blur-[80px] opacity-30 animate-pulse"></div>
                <img src="logo.jpeg" alt="Logo" class="relative w-52 h-52 object-contain rounded-full border border-white/10 shadow-2xl">
            </div>
            <h1 id="title-text" class="text-5xl font-black tracking-tight mb-2">
                <span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span>
            </h1>
            <img src="med.jpeg" alt="MedAlert" class="w-48 h-auto opacity-80 rounded-lg">
        </header>

        <div id="monitor-box" class="w-full max-w-md bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-8 mb-6 text-center shadow-2xl cursor-pointer" onclick="forceTrigger()">
             <p class="text-purple-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Senzor G-Force</p>
             <div id="accel-val" class="text-7xl font-black text-white">0.00</div>
             <div class="w-full bg-gray-900 h-3 rounded-full mt-6 overflow-hidden">
                <div id="accel-bar" class="bg-gradient-to-r from-blue-500 to-purple-600 h-full transition-all duration-150" style="width: 0%"></div>
             </div>
        </div>

        <div id="patient-info" class="w-full max-w-md space-y-3 mb-8">
            <div class="bg-white/5 border border-blue-500/20 rounded-2xl p-5">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Utilizator</p>
                <p class="text-xl font-medium">Andrei <span class="text-purple-500 font-black">Popescu</span></p>
            </div>
            <div class="bg-blue-900/30 border border-blue-400/40 rounded-2xl p-5">
                <p class="text-blue-300 text-[10px] font-bold uppercase tracking-widest">Afecțiune Monitorizată</p>
                <p class="text-2xl font-black text-white italic tracking-tight uppercase">EPILEPSIE</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 border-l-8 border-l-red-600 rounded-2xl p-5">
                <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">Alergii Critice</p>
                <p class="text-lg text-red-500 font-black uppercase italic">Penicilină, Polen</p>
            </div>
        </div>

        <div id="timer-ui" class="hidden w-full max-w-md text-center p-8 bg-yellow-600 rounded-[2.5rem] border-4 border-white mb-6 animate-pulse shadow-2xl">
            <p class="text-white font-black text-xl mb-2 italic uppercase">Impact Detectat!</p>
            <p class="text-white text-7xl font-black mb-6" id="countdown-number">5</p>
            <button onclick="cancelAlert()" class="w-full py-5 bg-black text-white font-black rounded-2xl text-xl uppercase border-2 border-white active:scale-95 transition-transform">
                Sunt bine (Anulează)
            </button>
        </div>

        <div id="emergency-ui" class="hidden w-full max-w-md text-center p-8 bg-red-600 rounded-[2.5rem] border-4 border-white mb-8 shadow-2xl">
            <p class="text-white font-black text-2xl mb-6 animate-bounce">🚨 INIȚIALIZARE APEL 112</p>
            <a id="sms-btn" href="#" class="block w-full py-6 bg-white text-red-600 font-black rounded-2xl text-2xl shadow-2xl uppercase mb-4 active:scale-90 transition-transform">
                Trimite SMS
            </a>
            <button onclick="stopEverything()" class="w-full py-4 bg-black/60 text-white font-black rounded-2xl text-lg uppercase border-2 border-white/40">
                OPRIRE / RESET
            </button>
        </div>

        <button id="main-btn" onclick="requestPermissions()" class="mt-auto mb-6 w-full max-w-md py-6 bg-gradient-to-r from-blue-600 to-purple-700 rounded-3xl font-black text-2xl tracking-widest uppercase border border-white/20 shadow-xl active:scale-95 transition-all">
            Activare
        </button>
    </div>

<script>
    let isActive = false;
    let hasAlerted = false;
    let isCountingDown = false;
    let countdownTimer = null;
    let audioCtx = null;
    let timeLeft = 5;
    let clickCount = 0;
    let sirenInterval = null;
    let flashInterval = null;
    let isFlashOn = false;
    let videoTrack = null;

    async function requestPermissions() {
        if (isActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let motionGranted = false;
        let cameraStream = null;

        // 1. Motion Permission (iOS specific, user interaction required)
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permissionState = await DeviceMotionEvent.requestPermission();
                if (permissionState === 'granted') {
                    motionGranted = true;
                } else {
                    alert("Eroare: Accesul la senzori a fost refuzat. Sistemul nu s-a putut activa complet.");
                    return; // Stop flow
                }
            } catch (e) {
                console.error("Error requesting motion permission:", e);
                return; // Stop flow
            }
        } else {
            // Motion permission not required explicitly on other platforms, assume access
            motionGranted = true; 
        }

        // 2. Camera Permission (Flash, back camera)
        try {
            if (motionGranted) {
                // Wait briefly for motion permission call stack to clear
                await new Promise(resolve => setTimeout(resolve, 100));
                
                // Request camera permission explicitly
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                
                if (cameraStream) {
                    videoTrack = cameraStream.getVideoTracks()[0];
                    // permissions granted. videoTrack stored. Stream will be stopped in stopEverything to free resources.
                }
            }
        } catch (e) {
            console.error('Error accessing camera for flash SOS:', e);
            // getUserMedia error: denial, no camera, or other issue. Flash SOS won't work physically.
            alert("Eroare: Accesul la cameră pentru Flash SOS a fost refuzat sau a apărut o eroare. Alerta fizică nu va funcționa, iar sistemul nu s-a activat complet.");
            return; // Stop flow
        }

        activateSystem(); 
    }

    function activateSystem() {
        isActive = true;
        const btn = document.getElementById('main-btn');
        btn.innerText = "SISTEM ACTIV";
        btn.className = "mt-auto mb-6 w-full max-w-md py-6 bg-black border-2 border-blue-500/40 rounded-3xl font-black text-2xl text-blue-400 uppercase shadow-inner";
        
        window.addEventListener('devicemotion', (e) => {
            if (hasAlerted || !isActive || isCountingDown) return;
            let a = e.acceleration;
            if (!a || a.x === null) return;
            let total = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            document.getElementById('accel-val').innerText = total.toFixed(2);
            document.getElementById('accel-bar').style.width = Math.min((total / 45) * 100, 100) + "%";
            
            if (total > 45) startCountdown(); 
        });
    }

    function forceTrigger() {
        if (!isActive) return;
        clickCount++;
        if (clickCount >= 3) {
            clickCount = 0;
            startCountdown();
        }
        setTimeout(() => { clickCount = 0; }, 2000);
    }

    function playCountdownSound() {
        let o = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square'; // Intermittent beep
        o.frequency.value = 300; 
        g.gain.value = 0.1;
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function startCountdown() {
        if(isCountingDown) return;
        isCountingDown = true;
        timeLeft = 5;
        document.getElementById('monitor-box').classList.add('hidden');
        document.getElementById('patient-info').classList.add('hidden');
        document.getElementById('header-section').classList.add('opacity-10');
        document.getElementById('timer-ui').classList.remove('hidden');
        document.getElementById('countdown-number').innerText = timeLeft;

        countdownTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown-number').innerText = timeLeft;
            playCountdownSound();

            if (timeLeft <= 0) {
                clearInterval(countdownTimer);
                triggerEmergency();
            }
        }, 1000);
    }

    function triggerEmergency() {
        hasAlerted = true;
        isCountingDown = false;
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('emergency-ui').classList.remove('hidden');
        document.getElementById('main-body').classList.add('emergency-active');
        document.getElementById('header-section').classList.remove('opacity-10');
        document.getElementById('title-text').innerHTML = "<span class='text-white font-black'>ALERTĂ!</span>";
        
        // SIRENA DE URGENTA REALA (Alternating siren sound)
        sirenInterval = setInterval(() => {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            let freq = (Math.floor(Date.now() / 500) % 2 === 0) ? 900 : 600;
            o.frequency.value = freq;
            g.gain.value = 0.2;
            o.start(); o.stop(audioCtx.currentTime + 0.4);
        }, 500);

        // Flash SOS blinking
        clearInterval(flashInterval); // ensure old interval cleared
        isFlashOn = false; // ensure flash starts off physically
        flashInterval = setInterval(() => {
            isFlashOn = !isFlashOn;
            if (videoTrack && navigator.mediaDevices.getSupportedConstraints().torch) {
                // browser supports torch, videoTrack stored. physically toggle.
                videoTrack.applyConstraints({ advanced: [{ torch: isFlashOn }] })
                    .catch(e => console.error("Error toggling flash physically:", e));
            }
        }, 500);

        const nr = "+40729592904"; 
        navigator.geolocation.getCurrentPosition((pos) => {
            let maps = `http://googleusercontent.com/maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            document.getElementById('sms-btn').href = `sms:${nr}?body=${encodeURIComponent("ALERTA EPIGUARD! Andrei are o criza de EPILEPSIE. Locatie GPS: " + maps)}`;
        });
    }

    function cancelAlert() {
        clearInterval(countdownTimer);
        isCountingDown = false;
        document.getElementById('timer-ui').classList.add('hidden');
        document.getElementById('monitor-box').classList.remove('hidden');
        document.getElementById('patient-info').classList.remove('hidden');
        document.getElementById('header-section').classList.remove('opacity-10');
    }

    function stopEverything() {
        // Stop audio sirens
        if (sirenInterval) clearInterval(sirenInterval);
        
        // Stop Flash SOS blinking, clear interval, turn off physically if supported
        if (flashInterval) clearInterval(flashInterval);
        isFlashOn = false;
        if (videoTrack && navigator.mediaDevices.getSupportedConstraints().torch) {
            videoTrack.applyConstraints({ advanced: [{ torch: false }] })
                .catch(e => console.error("Error turning off flash physically in stop:", e));
        }
        
        // Reset patient info, monitoring box, and background/header opacity
        hasAlerted = false;
        isCountingDown = false;
        document.getElementById('emergency-ui').classList.add('hidden');
        document.getElementById('main-body').classList.remove('emergency-active');
        document.getElementById('monitor-box').classList.remove('hidden');
        document.getElementById('patient-info').classList.remove('hidden');
        document.getElementById('header-section').classList.remove('opacity-10');
        
        // Restore title and activate button to active system state, as sensed above
        document.getElementById('title-text').innerHTML = '<span class="text-blue-500">Epi</span><span class="text-purple-500">Guard</span>';
        
        // Stop video track only in stopEverything to avoid persistent camera use after system stop
        if (videoTrack) {
            videoTrack.stop();
            videoTrack = null;
        }
    }
</script>
</body>
</html>
